<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=/user-interface/" />
    <title>ClinicConnect</title>
    <style>
      :root {
        --primary: #6366f1;
        --bg: #0f172a;
      }
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: white;
        overflow: hidden;
      }
      .content {
        text-align: center;
        animation: fadeUp 1s ease-out forwards;
      }
      .logo-text {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #818cf8, #c084fc);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .loader {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #818cf8;
        border-radius: 50%;
        margin: 20px auto;
        animation: spin 1s linear infinite;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }
    </style>
    <script>
      // Fast redirect
      window.location.replace('/user-interface/');
    </script>
  </head>
  <body>
    <div class="content">
      <div class="logo-text">ClinicConnect</div>
      <div class="loader"></div>
      <p style="opacity: 0.6; font-size: 0.875rem;">Connecting you to care...</p>
    </div>
    <div class="sr-only">
      Redirecting to <a href="/user-interface/">ClinicConnect</a>...
    </div>
  </body>
</html>
